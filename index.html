<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>m1l0s.io</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <!-- PTICE VAN SVIH KONTEJNERA -->
  <div class="birds-layer" aria-hidden="true">
    <svg class="bird-svg bird-1" viewBox="0 0 40 20">
      <path d="M2 14C8 7 14 6 20 12C26 6 32 7 38 14"></path>
    </svg>
    <svg class="bird-svg bird-2" viewBox="0 0 40 20">
      <path d="M2 14C8 8 14 7 20 11C26 7 32 8 38 14"></path>
    </svg>
    <svg class="bird-svg bird-3" viewBox="0 0 40 20">
      <path d="M2 15C8 9 14 8 20 12C26 8 32 9 38 15"></path>
    </svg>
    <svg class="bird-svg bird-4" viewBox="0 0 40 20">
      <path d="M2 13C8 7 14 6 20 10C26 6 32 7 38 13"></path>
    </svg>
    <svg class="bird-svg bird-5" viewBox="0 0 40 20">
      <path d="M2 14C8 8 14 7 20 11C26 7 32 8 38 14"></path>
    </svg>
  </div>

  <main class="hero">
    <div class="avatar-wrap">
      <img src="./assets/me.png" alt="Milos portrait" class="avatar-img" />
    </div>

    <p class="hero-text">
      A website about identity and ideas, still quietly under construction.
    </p>

    <div class="countdown-wrap">
      <div class="countdown">
        <div class="countdown-block">
          <div class="countdown-number" id="days">0</div>
          <div class="countdown-label">Days</div>
        </div>

        <div class="countdown-colon">:</div>

        <div class="countdown-block">
          <div class="countdown-number" id="hours">00</div>
          <div class="countdown-label">Hours</div>
        </div>

        <div class="countdown-colon">:</div>

        <div class="countdown-block">
          <div class="countdown-number" id="minutes">00</div>
          <div class="countdown-label">Minutes</div>
        </div>

        <div class="countdown-colon">:</div>

        <div class="countdown-block">
          <div class="countdown-number" id="seconds">00</div>
          <div class="countdown-label">Seconds</div>
        </div>
      </div>
    </div>

    <div class="hero-actions">
      <a href="mailto:hello@m1l0s.io" class="hero-btn hero-btn--filled">
        CONTACT US
      </a>

      <a href="./about.html" class="hero-btn hero-btn--outline">
        More Info
      </a>
    </div>
  </main>

<script>
  const COUNTDOWN_TARGET = "2026-05-06T10:00:00";

  const daysEl = document.getElementById("days");
  const hoursEl = document.getElementById("hours");
  const minutesEl = document.getElementById("minutes");
  const secondsEl = document.getElementById("seconds");

  function updateCountdown() {
    const targetDate = new Date(COUNTDOWN_TARGET);
    const now = new Date();
    const diff = targetDate - now;

    if (isNaN(targetDate.getTime()) || diff <= 0) {
      daysEl.textContent = "00";
      hoursEl.textContent = "00";
      minutesEl.textContent = "00";
      secondsEl.textContent = "00";
      return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    daysEl.textContent = String(days).padStart(2, "0");
    hoursEl.textContent = String(hours).padStart(2, "0");
    minutesEl.textContent = String(minutes).padStart(2, "0");
    secondsEl.textContent = String(seconds).padStart(2, "0");
  }

  updateCountdown();
  setInterval(updateCountdown, 1000);
</script>
</body>
</html>
