<!DOCTYPE html>
<html lang="en">
<head>

<body>
  <!-- Flying birds -->
  <svg class="bird-svg bird-1" viewBox="0 0 24 12" aria-hidden="true">
    <path d="M1 8c3-5 7-5 10 0c3-5 7-5 12 0" />

  <svg class="bird-svg bird-2" viewBox="0 0 24 12" aria-hidden="true">

    <path d="M1 8c3-5 7-5 10 0c3-5 7-5 12 0" />

  <svg class="bird-svg bird-4" viewBox="0 0 24 12" aria-hidden="true">
    <path d="M1 8c3-5 7-5 10 0c3-5 7-5 12 0" />

  <svg class="bird-svg bird-5" viewBox="0 0 24 12" aria-hidden="true">

  <main class="hero">
    <div class="avatar-wrap">
      <img class="avatar-img" src="avatar.png" alt="Avatar" />

      <svg class="avatar-birds" viewBox="0 0 220 220" aria-hidden="true">
        <path d="M58 84c6-10 14-10 20 0c6-10 14-10 20 0" />
        <path d="M132 62c5-8 11-8 16 0c5-8 11-8 16 0" />
        <path d="M144 122c4-6 9-6 13 0c4-6 9-6 13 0" />

    <p class="hero-text">
      Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.
    </p>

    <section class="countdown" aria-label="Countdown">
      <div class="countdown-block">
        <div class="countdown-number">12</div>
        <div class="countdown-label">Days</div>
      </div>
      <div class="countdown-colon">:</div>
      <div class="countdown-block">
        <div class="countdown-number">08</div>
        <div class="countdown-label">Hours</div>
      </div>
      <div class="countdown-colon">:</div>
      <div class="countdown-block">
        <div class="countdown-number">44</div>
        <div class="countdown-label">Minutes</div>
      </div>
      <div class="countdown-colon">:</div>
      <div class="countdown-block">
        <div class="countdown-number">19</div>
        <div class="countdown-label">Seconds</div>
      </div>

    <div class="hero-actions">
      <a class="hero-btn hero-btn--filled" href="#">Subscribe</a>
      <a class="hero-btn hero-btn--outline" href="About.html">More Info</a>
