<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About — m1l0s.io</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="about-page">
    <section class="about-hero">
      <div class="avatar-wrap about-avatar">
        <img src="./assets/me.png" alt="Milos portrait" class="avatar-img" />

        <div class="avatar-birds" aria-hidden="true">
          <svg class="bird-svg bird-1" viewBox="0 0 40 20">
            <path d="M2 14C8 7 14 6 20 12C26 6 32 7 38 14"></path>
          </svg>
          <svg class="bird-svg bird-2" viewBox="0 0 40 20">
            <path d="M2 14C8 8 14 7 20 11C26 7 32 8 38 14"></path>
          </svg>
          <svg class="bird-svg bird-3" viewBox="0 0 40 20">
            <path d="M2 15C8 9 14 8 20 12C26 8 32 9 38 15"></path>
          </svg>
          <svg class="bird-svg bird-4" viewBox="0 0 40 20">
            <path d="M2 13C8 7 14 6 20 10C26 6 32 7 38 13"></path>
          </svg>
          <svg class="bird-svg bird-5" viewBox="0 0 40 20">
            <path d="M2 14C8 8 14 7 20 11C26 7 32 8 38 14"></path>
          </svg>
        </div>
      </div>

      <p class="about-text">
        This website is a small digital home for identity, ideas, and selected work, presented in a simple format without unnecessary noise.
      </p>

      <div class="countdown countdown--ghost" aria-hidden="true">
        <div class="countdown-block">
          <div class="countdown-number">88</div>
          <div class="countdown-label">Days</div>
        </div>
        <div class="countdown-colon">:</div>
        <div class="countdown-block">
          <div class="countdown-number">23</div>
          <div class="countdown-label">Hours</div>
        </div>
        <div class="countdown-colon">:</div>
        <div class="countdown-block">
          <div class="countdown-number">59</div>
          <div class="countdown-label">Minutes</div>
        </div>
        <div class="countdown-colon">:</div>
        <div class="countdown-block">
          <div class="countdown-number">59</div>
          <div class="countdown-label">Seconds</div>
        </div>
      </div>

      <div class="about-actions">
        <a href="mailto:hello@m1l0s.io" class="hero-btn hero-btn--filled">Contact</a>
        <a href="/" class="hero-btn hero-btn--outline">Home</a>
      </div>
    </section>
  </main>
</body>
</html>
